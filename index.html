<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketplace Toko</title>

<style>
:root{
  --primary:#0d6efd;
  --green:#25D366;
  --bg:#f5f5f5;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
}

header{
  position:sticky;
  top:0;
  z-index:100;
  background:white;
  padding:10px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.search{
  display:flex;
  background:#eee;
  border-radius:999px;
  padding:10px;
}

.search input{
  flex:1;
  border:none;
  background:transparent;
  outline:none;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:12px;
  padding-bottom:120px;
}

.card{
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
  cursor:pointer;
  transition:.2s;
}

.card:active{
  transform:scale(.97);
}

.card img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
}

.card-body{
  padding:10px;
}

.title{
  font-weight:700;
  font-size:14px;
}

.price{
  color:var(--primary);
  font-weight:bold;
  margin-top:5px;
}

.badge{
  display:inline-block;
  background:#ff4d4d;
  color:white;
  padding:2px 6px;
  border-radius:6px;
  font-size:11px;
  margin-top:5px;
}

.detail{
  position:fixed;
  inset:0;
  background:white;
  z-index:999;
  overflow:auto;
  display:none;
}

.detail img{
  width:100%;
}

.detail-content{
  padding:15px;
}

.qty{
  display:flex;
  align-items:center;
  gap:10px;
}

.qty button{
  padding:6px 12px;
}

.btn{
  width:100%;
  border:none;
  border-radius:12px;
  padding:14px;
  font-weight:bold;
  margin-top:10px;
}

.btn-primary{
  background:var(--primary);
  color:white;
}

.btn-wa{
  background:var(--green);
  color:white;
}

.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px;
  box-shadow:0 -2px 10px rgba(0,0,0,.1);
}

.page{
  display:none;
}

.active{
  display:block;
}

.form{
  padding:12px;
  background:white;
}

input,textarea{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #ddd;
  margin:6px 0;
}

.cartbar{
  position:fixed;
  left:0;
  right:0;
  bottom:65px;
  background:white;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 -2px 10px rgba(0,0,0,.1);
}

.hide{
  display:none;
}
</style>
</head>
<body>

<header>
  <div class="search">
    <input type="text" placeholder="Cari produk..." oninput="cari(this.value)">
  </div>
</header>

<!-- HOME -->
<div id="home" class="page active">
  <div id="catalog" class="grid"></div>
</div>

<!-- ADMIN -->
<div id="menu" class="page">
  <div class="form">

    <input id="nama" placeholder="Nama produk">
    <input id="harga" type="number" placeholder="Harga">
    <input id="stok" type="number" placeholder="Stok">
    <textarea id="desc" placeholder="Deskripsi"></textarea>
    <input type="file" id="foto">

    <button class="btn btn-primary" onclick="tambahProduk()">
      + Tambah Produk
    </button>

  </div>
</div>

<!-- DETAIL -->
<div id="detail" class="detail"></div>

<!-- CART -->
<div id="cartbar" class="cartbar hide">
  <div>
    <b id="cartCount">0 item</b>
    <div id="cartTotal">Rp0</div>
  </div>

  <button class="btn btn-wa" onclick="checkout()">
    Checkout WA
  </button>
</div>

<!-- NAV -->
<div class="bottom-nav">
  <div onclick="nav('home')">🏠</div>
  <div onclick="nav('home')">📦</div>
  <div onclick="nav('menu')">➕</div>
  <div onclick="toggleAdmin()">🔐</div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<script>

/* =========================
   FIREBASE CONFIG
========================= */

  const firebaseConfig = {
  apiKey: "AIzaSyDruQxhQfsmsDAubunSrohBX9ZALlXtp5E",
  authDomain: "toko-pakaian-91050.firebaseapp.com",
  projectId: "toko-pakaian-91050",
  storageBucket: "toko-pakaian-91050.firebasestorage.app",
  messagingSenderId: "418943349139",
  appId: "1:418943349139:web:6e0a3ab8c71e784c7b7866"
};


firebase.initializeApp(firebaseConfig)

const db = firebase.firestore()
const storage = firebase.storage()

/* =========================
   CONFIG
========================= */

const CONFIG = {
  wa: "6281234567890"
}

/* =========================
   STATE
========================= */

let data=[]
let cart=[]
let q=1
let admin=false

/* =========================
   UTIL
========================= */

function rp(n){
  return "Rp" + Number(n||0).toLocaleString('id-ID')
}

/* =========================
   LOAD PRODUK
========================= */

function loadProduk(){

  db.collection("produk")
  .orderBy("createdAt","desc")
  .onSnapshot(snapshot=>{

    data=[]

    snapshot.forEach(doc=>{
      data.push({
        id:doc.id,
        ...doc.data()
      })
    })

    render(data)
  })
}

/* =========================
   RENDER
========================= */

function render(list=data){

  let html=""

  list.forEach((p,i)=>{

    html += `
    <div class="card" onclick="lihat(${i})">

      <img src="${p.foto}" onerror="this.src='https://picsum.photos/300?${i}'">

      <div class="card-body">

        <div class="title">${p.nama}</div>

        <div class="price">${rp(p.harga)}</div>

        ${p.stok < 5 ? '<div class="badge">Stok sedikit</div>' : ''}

      </div>

    </div>`
  })

  document.getElementById("catalog").innerHTML = html
}

/* =========================
   TAMBAH PRODUK
========================= */

async function tambahProduk(){

  let nama=document.getElementById("nama").value.trim()
  let harga=Number(document.getElementById("harga").value)
  let stok=Number(document.getElementById("stok").value)
  let desc=document.getElementById("desc").value.trim()
  let file=document.getElementById("foto").files[0]

  if(!nama || !harga){
    alert("Nama & harga wajib")
    return
  }

  let fotoUrl = "https://picsum.photos/300"

  if(file){

    let namaFile = Date.now() + "_" + file.name

    let ref = storage.ref("produk/" + namaFile)

    await ref.put(file)

    fotoUrl = await ref.getDownloadURL()
  }

  await db.collection("produk").add({
    nama,
    harga,
    stok,
    desc,
    foto:fotoUrl,
    createdAt:Date.now()
  })

  resetForm()

  alert("Produk berhasil ditambahkan")
}

/* =========================
   RESET FORM
========================= */

function resetForm(){
  document.getElementById("nama").value=""
  document.getElementById("harga").value=""
  document.getElementById("stok").value=""
  document.getElementById("desc").value=""
  document.getElementById("foto").value=""
}

/* =========================
   DETAIL
========================= */

function lihat(i){

  let p=data[i]

  q=1

  document.getElementById("detail").innerHTML=`

    <img src="${p.foto}">

    <div class="detail-content">

      <h2>${p.nama}</h2>

      <div class="price">${rp(p.harga)}</div>

      <p>Stok: ${p.stok}</p>

      <p>${p.desc || ''}</p>

      <div class="qty">

        <button onclick="kurang()">-</button>

        <span id="qty">1</span>

        <button onclick="tambah()">+</button>

      </div>

      <button class="btn btn-primary" onclick="addCart(${i})">
        + Keranjang
      </button>

      <button class="btn btn-wa" onclick="waNow(${i})">
        Pesan via WA
      </button>

      ${admin ? `
      <button class="btn" onclick="hapus('${p.id}')">
        Hapus Produk
      </button>` : ''}

      <button class="btn" onclick="tutup()">
        Tutup
      </button>

    </div>
  `

  document.getElementById("detail").style.display="block"
}

function tutup(){
  document.getElementById("detail").style.display="none"
}

function tambah(){
  q++
  document.getElementById("qty").innerText=q
}

function kurang(){
  if(q>1){
    q--
    document.getElementById("qty").innerText=q
  }
}

/* =========================
   CART
========================= */

function addCart(i){

  let p=data[i]

  let item = cart.find(x=>x.id===p.id)

  if(item){
    item.qty += q
  }else{
    cart.push({
      id:p.id,
      nama:p.nama,
      harga:p.harga,
      qty:q
    })
  }

  updateCart()

  alert("Masuk keranjang")
}

function updateCart(){

  let total=0
  let count=0

  cart.forEach(i=>{
    total += i.harga * i.qty
    count += i.qty
  })

  document.getElementById("cartCount").innerText=count+" item"
  document.getElementById("cartTotal").innerText=rp(total)

  document.getElementById("cartbar")
  .classList.toggle("hide", count===0)
}

/* =========================
   CHECKOUT
========================= */

function checkout(){

  let text="Halo, saya mau pesan:%0A"

  let total=0

  cart.forEach(i=>{

    total += i.harga * i.qty

    text += `- ${i.nama} x${i.qty} = ${rp(i.harga*i.qty)}%0A`
  })

  text += `%0ATotal: ${rp(total)}`

  window.open(`https://wa.me/${CONFIG.wa}?text=${text}`)
}

function waNow(i){

  let p=data[i]

  let text=`Halo, saya mau pesan:%0A${p.nama}%0AQty:${q}`

  window.open(`https://wa.me/${082285712293}?text=${text}`)
}

/* =========================
   HAPUS
========================= */

async function hapus(id){

  if(confirm("Hapus produk?")){

    await db.collection("produk")
    .doc(id)
    .delete()

    tutup()
  }
}

/* =========================
   SEARCH
========================= */

function cari(k){

  let hasil = data.filter(p=>
    p.nama.toLowerCase().includes(k.toLowerCase())
  )

  render(hasil)
}

/* =========================
   NAV
========================= */

function nav(id){

  document.querySelectorAll('.page')
  .forEach(p=>p.classList.remove('active'))

  document.getElementById(id)
  .classList.add('active')
}

/* =========================
   ADMIN
========================= */

function toggleAdmin(){

  admin=!admin

  alert(admin ? 'Admin aktif' : 'Admin nonaktif')
}

/* =========================
   INIT
========================= */

loadProduk()

</script>
</body>
</html>
