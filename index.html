<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katalog Toko Pro</title>

<style>
body {font-family:sans-serif;margin:0;background:#f2f2f2;}

header{
  background:#25D366;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:white;
  border-radius:12px;
  padding:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:10px;
  background:#eee;
}

.btn{
  background:#25D366;
  color:white;
  border:none;
  padding:12px;
  width:100%;
  border-radius:10px;
  font-weight:bold;
}

.detail{
  display:none;
  padding:15px;
}

.qty{
  display:flex;
  gap:10px;
  align-items:center;
}

.qty button{
  padding:6px 12px;
}

.form{
  padding:10px;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

.admin-btn{
  font-size:12px;
  color:red;
  margin-top:5px;
}
</style>
</head>

<body>

<header>
  <b>Katalog Toko</b>
  <button onclick="share()">Share</button>
</header>

<div class="form">
  <input type="text" id="nama" placeholder="Nama produk">
  <input type="number" id="harga" placeholder="Harga">
  <input type="number" id="stok" placeholder="Stok">
  <input type="file" id="foto">
  <button class="btn" onclick="tambahProduk()">+ Tambah Produk</button>
</div>

<div id="catalog" class="grid"></div>
<div id="detail" class="detail"></div>

<script>

let data = JSON.parse(localStorage.getItem("produk")) || []
let admin = true
let q = 1

function simpan(){
  localStorage.setItem("produk", JSON.stringify(data))
}

function render(){
  let html=""
  data.forEach((p,i)=>{
    html+=`
    <div class="card" onclick="lihat(${i})">
      <img src="${p.foto}" onerror="this.src='https://picsum.photos/300'">
      <b>${p.nama}</b><br>
      Rp${p.harga}<br>
      Stok: ${p.stok}
      ${admin ? `<div class="admin-btn" onclick="edit(${i});event.stopPropagation()">Edit | Hapus</div>` : ""}
    </div>`
  })
  document.getElementById("catalog").innerHTML=html
}

function tambahProduk(){
  let nama=document.getElementById("nama").value
  let harga=document.getElementById("harga").value
  let stok=document.getElementById("stok").value
  let file=document.getElementById("foto").files[0]

  if(!nama || !harga || !stok) return alert("Isi lengkap!")

  let reader=new FileReader()
  reader.onload=function(e){
    data.push({
      nama,
      harga,
      stok,
      foto:e.target.result
    })
    simpan()
    render()
  }

  if(file){
    reader.readAsDataURL(file)
  }else{
    data.push({nama,harga,stok,foto:"https://picsum.photos/300"})
    simpan()
    render()
  }
}

function lihat(i){
  let p=data[i]
  q=1

  document.getElementById("catalog").style.display="none"
  document.getElementById("detail").style.display="block"

  document.getElementById("detail").innerHTML=`
    <button onclick="kembali()">← Kembali</button>
    <img src="${p.foto}" width="100%">
    <h2>${p.nama}</h2>
    <h3>Rp${p.harga}</h3>
    <p>Stok: ${p.stok}</p>

    <div class="qty">
      <button onclick="kurang()">-</button>
      <span id="qty">1</span>
      <button onclick="tambah()">+</button>
    </div><br>

    <button class="btn" onclick="wa(${i})">Pesan via WhatsApp</button>
  `
}

function kembali(){
  document.getElementById("catalog").style.display="grid"
  document.getElementById("detail").style.display="none"
}

function tambah(){q++;document.getElementById("qty").innerText=q}
function kurang(){if(q>1){q--;document.getElementById("qty").innerText=q}}

function wa(i){
  let p=data[i]
  let total=p.harga*q
  let text=`Halo kak, saya mau pesan:%0A${p.nama}%0AQty: ${q}%0ATotal: Rp${total}`
  window.open(`https://wa.me/628xxxxxxx?text=${text}`)
}

function edit(i){
  if(confirm("Hapus produk?")){
    data.splice(i,1)
    simpan()
    render()
  }
}

function share(){
  if(navigator.share){
    navigator.share({url:location.href})
  }else{
    alert("Copy link manual ya")
  }
}

render()

</script>

</body>
</html>
