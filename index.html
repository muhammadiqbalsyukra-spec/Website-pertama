<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katalog Toko</title>

<style>
body {font-family: sans-serif; margin:0; background:#f5f5f5;}
header {
  background:#25D366; color:white;
  padding:15px; font-size:18px;
  display:flex; justify-content:space-between;
}
.grid {
  display:grid;
  grid-template-columns: repeat(2,1fr);
  gap:10px; padding:10px;
}
.card {
  background:white; border-radius:10px;
  padding:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
.card img {
  width:100%; height:120px;
  object-fit:cover; border-radius:8px;
}
.btn {
  background:#25D366; color:white;
  padding:10px; border:none;
  border-radius:8px; width:100%;
}
.detail {display:none; padding:15px;}
.qty {display:flex; gap:10px; align-items:center;}
.qty button {padding:5px 10px;}
.admin {font-size:12px; color:red;}
</style>

</head>

<body>

<header>
  <div>Katalog Toko</div>
  <button onclick="share()">Share</button>
</header>

<div id="catalog" class="grid"></div>

<div id="detail" class="detail"></div>

<script>

let admin = true // ubah false kalau bukan admin

let data = [
  {
    nama:"Bulgogi Pan",
    harga:158000,
    stok:10,
    foto:"https://via.placeholder.com/300"
  }
]

function render(){
  let html=""
  data.forEach((p,i)=>{
    html+=`
    <div class="card" onclick="detail(${i})">
      <img src="${p.foto}">
      <b>${p.nama}</b><br>
      Rp${p.harga}<br>
      Stok: ${p.stok}
      ${admin ? `<div class="admin" onclick="edit(${i});event.stopPropagation()">Edit | Hapus</div>` : ""}
    </div>`
  })
  document.getElementById("catalog").innerHTML=html
}

function detail(i){
  let p=data[i]
  document.getElementById("catalog").style.display="none"
  document.getElementById("detail").style.display="block"

  document.getElementById("detail").innerHTML=`
  <button onclick="back()">← Kembali</button>
  <img src="${p.foto}" width="100%">
  <h2>${p.nama}</h2>
  <h3>Rp${p.harga}</h3>
  <p>Stok: ${p.stok}</p>

  <div class="qty">
    <button onclick="kurang()">-</button>
    <span id="qty">1</span>
    <button onclick="tambah()">+</button>
  </div><br>

  <button class="btn" onclick="wa(${i})">Pesan via WA</button>
  `
}

function back(){
  document.getElementById("catalog").style.display="grid"
  document.getElementById("detail").style.display="none"
}

let q=1
function tambah(){q++;document.getElementById("qty").innerText=q}
function kurang(){if(q>1){q--;document.getElementById("qty").innerText=q}}

function wa(i){
  let p=data[i]
  let total=p.harga*q
  let text=`Halo, saya mau pesan:%0A${p.nama}%0AQty: ${q}%0ATotal: Rp${total}`
  window.open(`https://wa.me/628xxxx?text=${text}`)
}

function share(){
  navigator.share ? navigator.share({url:location.href}) : alert("Copy link manual")
}

function edit(i){
  let nama=prompt("Nama baru",data[i].nama)
  if(!nama)return
  data[i].nama=nama
  render()
}

render()

</script>

</body>
</html>
