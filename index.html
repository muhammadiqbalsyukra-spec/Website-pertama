<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katalog Toko Pro</title>

<style>
body{font-family:sans-serif;margin:0;background:#f2f2f2;}

header{
  background:#25D366;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.form{padding:10px;background:white;}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:white;
  border-radius:12px;
  padding:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  cursor:pointer;
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:10px;
}

.btn{
  background:#25D366;
  color:white;
  border:none;
  padding:12px;
  width:100%;
  border-radius:10px;
  font-weight:bold;
}

.btn:disabled{
  background:gray;
}

.detail{display:none;padding:15px;}

.qty{display:flex;gap:10px;align-items:center;}
.qty button{padding:6px 12px;}

.admin{font-size:12px;color:red;}

.preview{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:10px;
  margin-top:5px;
}
</style>
</head>

<body>

<header>
  <b>Katalog Toko</b>
  <button onclick="share()">Share</button>
</header>

<div class="form">
  <input type="text" id="nama" placeholder="Nama produk">
  <input type="number" id="harga" placeholder="Harga">
  <input type="number" id="stok" placeholder="Stok">
  <input type="file" id="foto" onchange="previewImg()">
  <img id="preview" class="preview" style="display:none">
  <button id="btnTambah" class="btn" onclick="tambahProduk()">+ Simpan Produk</button>
</div>

<div id="catalog" class="grid"></div>
<div id="detail" class="detail"></div>

<script>

let data = JSON.parse(localStorage.getItem("produk")) || []
let q = 1
let loading = false

function simpan(){
  localStorage.setItem("produk", JSON.stringify(data))
}

function render(){
  let html=""
  data.forEach((p,i)=>{
    html+=`
    <div class="card" onclick="lihat(${i})">
      <img src="${p.foto}" onerror="this.src='https://picsum.photos/300'">
      <b>${p.nama}</b><br>
      Rp${p.harga}<br>
      Stok: ${p.stok}
      <div class="admin" onclick="event.stopPropagation(); editProduk(${i})">Edit | Hapus</div>
    </div>`
  })
  document.getElementById("catalog").innerHTML=html
}

function previewImg(){
  let file=document.getElementById("foto").files[0]
  let preview=document.getElementById("preview")

  if(file){
    preview.src=URL.createObjectURL(file)
    preview.style.display="block"
  }
}

function resetForm(){
  document.getElementById("nama").value=""
  document.getElementById("harga").value=""
  document.getElementById("stok").value=""
  document.getElementById("foto").value=""
  document.getElementById("preview").style.display="none"
}

function tambahProduk(){
  if(loading) return

  let btn = document.getElementById("btnTambah")
  let nama = document.getElementById("nama").value.trim()
  let harga = document.getElementById("harga").value.trim()
  let stok = document.getElementById("stok").value.trim()
  let file = document.getElementById("foto").files[0]

  if(!nama || !harga || !stok){
    alert("Isi semua data!")
    return
  }

  loading = true
  btn.disabled = true
  btn.innerText = "Menyimpan..."

  function selesai(foto){
    data.push({
      nama,
      harga: Number(harga),
      stok: Number(stok),
      foto
    })

    simpan()
    render()
    resetForm()

    loading = false
    btn.disabled = false
    btn.innerText = "+ Simpan Produk"
  }

  if(file){
    let reader = new FileReader()

    reader.onload = function(e){
      selesai(e.target.result)
    }

    reader.onerror = function(){
      alert("Gagal baca gambar")
      loading = false
      btn.disabled = false
      btn.innerText = "+ Simpan Produk"
    }

    reader.readAsDataURL(file)
  } else {
    selesai("https://picsum.photos/300?random=" + Date.now())
  }
}

function lihat(i){
  let p=data[i]
  q=1

  document.getElementById("catalog").style.display="none"
  document.getElementById("detail").style.display="block"

  document.getElementById("detail").innerHTML=`
    <button onclick="kembali()">← Kembali</button>
    <img src="${p.foto}" width="100%">
    <h2>${p.nama}</h2>
    <h3>Rp${p.harga}</h3>
    <p>Stok: ${p.stok}</p>

    <div class="qty">
      <button onclick="kurang()">-</button>
      <span id="qty">1</span>
      <button onclick="tambah()">+</button>
    </div><br>

    <button class="btn" onclick="wa(${i})">Pesan via WhatsApp</button>
  `
}

function kembali(){
  document.getElementById("catalog").style.display="grid"
  document.getElementById("detail").style.display="none"
}

function tambah(){q++;document.getElementById("qty").innerText=q}
function kurang(){if(q>1){q--;document.getElementById("qty").innerText=q}}

function wa(i){
  let p=data[i]
  let total=p.harga*q
  let text=`Halo kak, saya mau pesan:%0A${p.nama}%0AQty: ${q}%0ATotal: Rp${total}`
  window.open(`https://wa.me/628xxxxxxx?text=${text}`)
}

function editProduk(i){
  let aksi = prompt("Ketik: edit / hapus")

  if(aksi === "edit"){
    let nama=prompt("Nama",data[i].nama)
    let harga=prompt("Harga",data[i].harga)
    let stok=prompt("Stok",data[i].stok)

    if(nama && harga && stok){
      data[i].nama=nama
      data[i].harga=Number(harga)
      data[i].stok=Number(stok)
      simpan()
      render()
    }
  }

  if(aksi === "hapus"){
    if(confirm("Yakin hapus?")){
      data.splice(i,1)
      simpan()
      render()
    }
  }
}

function share(){
  if(navigator.share){
    navigator.share({url:location.href})
  }else{
    alert("Copy link manual ya")
  }
}

render()

</script>

</body>
</html>
